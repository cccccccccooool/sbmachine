demo:
  parsed_dir: output/demo
  anchor_tolerance_sec: 2.0
  plant_empty_timer_frames: 3

vision:
  sample_interval_sec: 1.0
  background_sample_interval_sec: 1.0
  crop_padding_px: 4
  global_mask_padding_px: 8
  yolo:
    enabled: true
    model_path: /opt/models_workspace/yolo_cs2.pt
    classes_file: data/vision/yolo_background/default/classes.json
    conf_threshold: 0.35
    white_frame_mean_threshold: 245
    skip_labels: [flash]
    prompt_labels:
      left_player_hud_group: "Mask left player HUD before VLM."
      right_player_hud_group: "Mask right player HUD before VLM."
      player_hud_group_unknown: "Mask player HUD before VLM."
      minimap: "Mask minimap before VLM."
      top_hud: "Mask top HUD before VLM."
      pov_player_bar: "OCR POV player marker bar, then mask it before VLM."
      timer: "OCR timer; do not mask timer."
      c4: "Keep C4 coordinate only; do not mask it."
  pov_ocr:
    # Normalized x1,y1,x2,y2 of the "Currently watching: XXX" name bar.
    # Calibrate by running: ffmpeg -ss 60 -i data/raw/match.mp4 -frames:v 1 /tmp/frame.png
    box: "0.42,0.90,0.58,0.97"
    min_match_score: 0.6
    enabled: true
    spectator_min_frames: 30  # lower to 3-5 after pov_ocr box is calibrated
  timer_ocr:
    box: "0.46,0.00,0.54,0.06"
    enabled: false  # enable only when YOLO misses the timer box

  score_ocr:
    # YOLO class "score" / "top_hud" takes priority when detected.
    # Set enabled: true + box to activate fixed-ROI fallback before YOLO is retrained.
    box: ""
    enabled: false

  align:
    duration_gap_penalty: 8.0    # L1 DP 丢段罚分（秒）
    onset_tolerance_sec: 0.5     # L2 onset 容差（秒）
    veto_threshold: 0.25         # L2 匹配分低于此时降低置信度

  sampling:
    demo_interval_sec: 1.0       # 背景行：每秒一行（恒含 demo 事实，不解码画面）
    vlm_interval_sec: 3.0        # 视觉行：每 3s 才喂图给 VLM
    dense_pre_sec: 1.5           # 事件窗：击杀/炸弹前几秒加密喂图
    dense_post_sec: 1.5          # 事件窗：击杀/炸弹后几秒加密喂图
    dense_fps: 2                 # 事件窗喂图帧率（fps）
    # 不设 VLM 预算上限：3s 网格 + 全部击杀/炸弹事件窗都真实调 VLM，不再降级。

  vlm:
    endpoint: http://127.0.0.1:23333/v1/chat/completions
    model: Qwen/Qwen2.5-VL-3B-Instruct
    temperature: 0.2
    max_tokens: 256
    timeout_sec: 120
    batch_size: 1          # 一次打包多少张图发给 VLM（1=原串行）；40G 卡建议从 4 开始测

profile: lite

# 容器拓扑开关：无论哪种模式，run.py 都全程管理生命周期。
#   manage_services: true  → 单容器：本容器内逐阶段 spawn 服务进程（vlm/ollama/sovits），显存错峰隔离。
#   manage_services: false → 多容器：run.py 自己 docker compose up 三个后端容器，跑完 down（默认）。
runtime:
  manage_services: false      # true=单容器(容器内多进程) / false=多容器(docker compose 三容器)
  compose_file: docker-compose.yml  # 多容器模式用的 compose 文件（manage_services=false 时生效）
  one_model_at_a_time: true   # 单卡错峰：每段开始前启服务，结束后停服务（manage_services=true 时生效）
  use_gpu_guard: true         # 霸占显存开关：true -> 每阶段开始前自动临时释放 gpu_guard，结束后恢复霸占

  services:
    vlm:
      enabled: true
      # 启动命令（相对项目根执行）
      start: "python tools/simple_vlm_server.py"
      startup_timeout_sec: 90
      # health_url 自动从 config/vision.yaml vision.vlm.endpoint 派生，勿重复填
    ollama:
      enabled: true
      start: "ollama serve"
      startup_timeout_sec: 30
      # model 自动从 config/llm.yaml semantic.model 读取
      # health_url 自动从 config/llm.yaml llm.ollama_url 派生
    sovits:
      enabled: true
      start: "bash -c 'cd /opt/GPT-SoVITS && python api_v2.py -a 0.0.0.0 -p 9880'"
      startup_timeout_sec: 90
      # host/port 自动从 audio_service/gpt_sovits_runtime.yaml api.host/port 读取

# 阶段开关：统一入口 run.py 按此依次执行，全部 config 驱动。
phases:
  demo_parse: false          # 调 Go 解析 .dem → output/demo（硬事实源）
  video_marking: false      # 运行 MobileNetV3 自动预测视频画面类型 (game/break)
  preprocess_slice: false    # 视频标记(round_segmenter) + 视频切片(可选 ffmpeg 小片) → rounds.json
  phase2_vision: false
  phase3_semantic: true
  phase4_assemble: true

# Debug 开关：开启后各阶段将输入/输出完整落盘到 output/debug_phase3/，正式跑时保持 false。
debug:
  phase3: true              # true → 每局 LLM 输入 prompt/messages + 原始输出落盘供排查幻觉

paths:
  # ── 上游输入 ──
  demo: data/raw/match.dem            # .dem 文件（demo_parse 输入）
  demo_output_dir: output/demo        # demo 工件输出目录
  video: data/raw/demo.mp4
  map_name: Unknown
  hud_detections_jsonl: examples/offline/demo_detections.jsonl  # 标记检测 JSONL（无 segments 时用）
  segments_json:                      # 已有片段 JSON（提供则跳过 round_segmenter）
  clip_dir:                           # 可选：切出每个小局视频到该目录

  # ── 中间/最终产物 ──
  rounds_json: output/sbmachine/rounds.json
  round_list_json: output/sbmachine/round_list.json
  segments_out_json: output/sbmachine/segments.json
  rounds_with_vision_json: output/sbmachine/rounds_with_vision.json
  rounds_with_neutral_json: output/sbmachine/rounds_with_neutral.json
  rounds_with_commentary_json: output/sbmachine/rounds_with_commentary.json
  rounds_final_json: output/sbmachine/rounds_final.json
  commentary_json: output/sbmachine/commentary.json
  assemble_manifest_json: output/sbmachine/assemble_manifest.json

phase4:
  output_dir: output/sbmachine/rounds   # 逐局产物输出目录（wav + mp4）
  commentary_volume: 1.0                # 解说音量 (0.0~1.0)
  game_audio_volume: 0.25              # 游戏原声音量 (0.0~1.0)
  make_video: false                     # true 才逐局切片+混音，默认仅产逐局 wav
